parent: classic
name: imperial-japhy
display_name: Imperial Dog & Cat — Japhy Design
version: 1.0.0
author:
  name: "Imperial Dev Team"
  email: "contact@imperialdog-cat.fr"

meta:
  compatibility:
    from: 1.7.0.0
    to: ~

  available_layouts:
    layout-full-width:
      name: Full Width
      description: No side columns, ideal for distraction-free pages such as product pages.
    layout-both-columns:
      name: Three Columns
      description: One large central column and 2 side columns.
    layout-left-column:
      name: Two Columns, small left column
      description: Two columns with a small left column
    layout-right-column:
      name: Two Columns, small right column
      description: Two columns with a small right column

assets:
  use_parent_assets: true
  css:
    all:
      - id: google-fonts-outfit
        path: https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;700;900&family=Caveat:wght@400;700&display=swap
        server: remote
        media: all
        priority: 100
      - id: imperial-design-system
        path: assets/css/design-system.css
        media: all
        priority: 200
      - id: imperial-header
        path: assets/css/header.css
        media: all
        priority: 250
      - id: imperial-footer
        path: assets/css/footer.css
        media: all
        priority: 260
      - id: imperial-custom
        path: assets/css/custom.css
        media: all
        priority: 300
  js:
    all:
      - id: imperial-main
        path: assets/js/main.js
        priority: 200
        position: bottom

global_settings:
  configuration:
    PS_IMAGE_QUALITY: png
  modules:
    to_enable:
      - ps_facetedsearch
      - ps_categorytree
      - ps_searchbar
      - blockreassurance
      - ps_shoppingcart
      - ps_customersignin
      - popnewsletter
      - productcomments
      - ps_socialfollow
    to_disable:
      - ps_imageslider
      - ps_featuredproducts
      - ps_banner
      - ps_customtext
      - ps_mainmenu
  hooks:
    modules_to_hook:
      displayNav2:
        - ps_customersignin
        - ps_shoppingcart
      displayTop:
        - ps_searchbar
      displayHome: ~
      displayFooter:
        - ps_socialfollow
        - popnewsletter
      displayLeftColumn:
        - ps_categorytree
        - ps_facetedsearch
      displayProductAdditionalInfo:
        - ps_sharebuttons
      displayReassurance:
        - blockreassurance
        - showsubscriptionproducts

  image_types:
    cart_default:
      width: 125
      height: 125
      scope: [products]
    small_default:
      width: 98
      height: 98
      scope: [products, categories, manufacturers, suppliers]
    medium_default:
      width: 452
      height: 452
      scope: [products, manufacturers, suppliers]
    home_default:
      width: 250
      height: 250
      scope: [products]
    large_default:
      width: 800
      height: 800
      scope: [products, manufacturers, suppliers]
    category_default:
      width: 141
      height: 180
      scope: [categories]
    stores_default:
      width: 170
      height: 115
      scope: [stores]

theme_settings:
  default_layout: layout-full-width
  layouts:
    category: layout-left-column
    best-sales: layout-left-column
    new-products: layout-left-column
    prices-drop: layout-left-column
    contact: layout-left-column
